name = "trip-tickets-2026"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "dist"
binding = "ASSETS"

# Lets worker/pipeline-workflow.ts `import cityThemePrompt from
# '../pipeline/prompts/city-theme.txt'` at build time (no fs read at runtime —
# customTheme.mjs takes promptTemplate as a plain string parameter).
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true

# KV-only storage (see docs/superpowers/specs/2026-07-21-public-cloud-deploy-design.md
# 更正 2): R2 needs a credit card on file, KV doesn't. TRIPS_KV holds per-trip
# progress status (`trip:<id>:status`); TRIPS_SITES holds the rendered site
# files (`trips/<id>/<path>`) that /trips/<slug>/* serves from.
[[kv_namespaces]]
binding = "TRIPS_KV"
id = "2be9bec372104cd5a9f09fb2af19f563"

[[kv_namespaces]]
binding = "TRIPS_SITES"
id = "8a0dd77046394540b7ef9e7f3f25d0e7"

# TripPipelineWorkflow (Task 6): brief → timezone → discovery/gmail/calendar/
# notion → composer → custom_theme → render → manifest.
[[workflows]]
binding = "TRIP_WORKFLOW"
name = "trip-pipeline-workflow"
class_name = "TripPipelineWorkflow"

# Manyfold Agent API (Option B): the pipeline's LLM calls run against the
# user's own Manyfold agent over A2A (pipeline/mf-client.mjs), not a raw
# ANTHROPIC_API_KEY — billed to the Manyfold account, not Anthropic directly.
[vars]
MF_API_URL = "https://api-staging.manyfold.ai/api"
MF_AGENT_ID = "agt_agpyjshs4b7obacdsev6x4m7wm"
# Created 2026-07-21 (mf agent create "travel-ticket-pipeline" --account).
# Still needs a manual A2A grant from Zack (see HANDOVER-CLOUD.md) before
# MF_AGENT_ID can actually mint a peer token for it.
AGENT_PIPELINE = "agt_agpyj7n5wr4r3h3euvlbrqehpy"

# Set via: wrangler secret put MF_API_TOKEN --config wrangler.itinerary.toml
# (this agent's own identity token, granted a2a:read + a2a:edit — Zack must
# set this himself; it is a live credential and is never printed/handled by
# the agent that builds this repo.)
